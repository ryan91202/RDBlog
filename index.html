<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content=" Hi I'm Ryan and this is my Ideas Blog — a collection of thoughts, notes, experiments, and creative ideas.">
<meta charset="UTF-8" />
<meta name="google-site-verification" content="d9-jEaWsEWlTgkrtrnBChB9hJ0zC8ggVAQ2QZ7SIb6w" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="keywords" content="Ryan blog, ideas blog, notes, creativity, experiments">
<meta name="author" content="Ryan">
<meta name="robots" content="index, follow">
<title>My Ideas Blog</title>

<style>
/* ====== GLOBAL ====== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: #0f172a;
  color: #e5e7eb;
  line-height: 1.6;
}

/* ====== HEADER ====== */
.top-bar {
  padding: 1.5rem 1rem;
  text-align: center;
  background: linear-gradient(135deg, #95B88F, #7c3aed);
  color:#8FB8AA;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.top-bar h1 {
  font-size: 2rem;
  margin-bottom: 0.25rem;
}

.subtitle {
  font-size: 0.95rem;
  opacity: 0.9;
}

/* ====== LAYOUT ====== */
.container {
  max-width: 900px;
  margin: 2rem auto;
  padding: 0 1rem 3rem;
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
  gap: 2rem;
}
@media (max-width: 800px) {
  .container {
    grid-template-columns: 1fr;
  }
}

section {
  background: #020617;
  border-radius: 0.75rem;
  padding: 1.5rem;
  border: 1px solid #1f2937;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

section h2 {
  font-size: 1.25rem;
  margin-bottom: 1rem;
  color: #e5e7eb;
}

/* ====== FORM ====== */
label {
  display: block;
  margin-bottom: 0.35rem;
  font-size: 0.9rem;
  color: #70AAB8;
}

input,
textarea {
  width: 100%;
  padding: 0.6rem 0.75rem;
  margin-bottom: 1rem;
  border-radius: 0.5rem;
  border: 1px solid #374151;
  background: #020617;
  color: #f9fafb;
  font-size: 0.95rem;
  outline: none;
  transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

input:focus,
textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 1px #3b82f6;
}

button {
  padding: 0.6rem 1.2rem;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: #f9fafb;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
  box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35);
}

button:hover {
  filter: brightness(1.05);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

/* ====== POSTS ====== */
.posts-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.post {
  padding: 1rem 1.1rem;
  border-radius: 0.75rem;
  background: radial-gradient(circle at top left, #111827, #020617);
  border: 1px solid #995395;
  position: relative;
}

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.4rem;
}

.post-title {
  font-size: 1.05rem;
  font-weight: 600;
}

.post-date {
  font-size: 0.75rem;
  color: #8ca3af;
}

.post-content {
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

.post-actions {
  margin-top: 0.7rem;
  display: flex;
  gap: 0.5rem;
}

.post-actions button {
  padding: 0.3rem 0.7rem;
  font-size: 0.75rem;
  box-shadow: none;
}

.delete-btn {
  background: #ef4444;
}

.footer {
  text-align: center;
  padding: 1rem 0 1.5rem;
  font-size: 0.8rem;
  color: #6b7280;
}
</style>
</head>

<body>

<header class="top-bar">
  <h1>My Ideas & Notes</h1>
  <p class="subtitle">A simple place for thoughts, experiments, and random brainwaves.</p>
</header>

<main class="container">
  <section class="new-post">
    <h2>New Post</h2>
    <form id="postForm">
      <label for="title">Title</label>
      <input id="title" type="text" placeholder="Give your idea a name..." required />

      <label for="content">Content</label>
      <textarea id="content" rows="6" placeholder="Write your idea here..." required></textarea>

      <button type="submit">Publish</button>
    </form>
  </section>

  <section class="posts">
    <h2>Posts</h2>
    <div id="postsContainer" class="posts-list"></div>
  </section>
</main>

<footer class="footer">
  Built by me, powered by static HTML/CSS/JS + Firebase.
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    orderBy,
    query
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDx7pyTcX3DrCgm3Pl4PpLZPMCZHJaAvhU",
    authDomain: "blog-ad61b.firebaseapp.com",
    projectId: "blog-ad61b",
    storageBucket: "blog-ad61b.appspot.com",
    messagingSenderId: "251170373130",
    appId: "1:251170373130:web:6982239416be2c3f90e9f3",
    measurementId: "G-PEP0W2Q1LQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const postForm = document.getElementById("postForm");
  const titleInput = document.getElementById("title");
  const contentInput = document.getElementById("content");
  const postsContainer = document.getElementById("postsContainer");

  async function loadPosts() {
    postsContainer.innerHTML = "<p style='color:#9ca3af;'>Loading...</p>";

    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    postsContainer.innerHTML = "";

    if (snapshot.empty) {
      postsContainer.innerHTML =
        "<p style='color:#9ca3af;'>No posts yet. Write something above and hit Publish.</p>";
      return;
    }

    snapshot.forEach((docSnap) => {
      const post = docSnap.data();
      const id = docSnap.id;

      const postEl = document.createElement("article");
      postEl.className = "post";

      postEl.innerHTML = `
        <div class="post-header">
          <h3 class="post-title">${post.title}</h3>
          <span class="post-date">${new Date(post.createdAt).toLocaleString()}</span>
        </div>
        <div class="post-content">${post.content}</div>
        <div class="post-actions">
          <button class="delete-btn" data-id="${id}">Delete</button>
        </div>
      `;

      postsContainer.appendChild(postEl);
    });

    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.onclick = async () => {
        await deleteDoc(doc(db, "posts", btn.dataset.id));
        loadPosts();
      };
    });
  }

  postForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    if (!title || !content) return;

    await addDoc(collection(db, "posts"), {
      title,
      content,
      createdAt: Date.now()
    });

    titleInput.value = "";
    contentInput.value = "";
    loadPosts();
  });

  loadPosts();
</script>

</body>
</html>
